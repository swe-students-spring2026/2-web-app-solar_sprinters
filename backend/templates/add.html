<!doctype html>
<html>
  <head>
    <title>Create Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>

  <body class="add-page">
    <div class="form-card">
      <a href="{{ url_for('home') }}" class="back-btn">Back</a>

      <h1 class="section-title center">

        Create Your Profile
      </h1>

      {% if error %}
      <p class="warning-text">{{ error }}</p>
      {% endif %}

      <form method="POST" action="{{ url_for('add_page') }}" class="form-stack">

        <label class="form-label">
          Name:
          <input type="text" name="name" placeholder="Enter name" required />
        </label>

        <label class="form-label">
          Address:
          <input type="text" name="address" placeholder="email address" required />
        </label>

        <h3 class="section-title">Pick Tags</h3>

        <div class="checkbox-group">
          <label><input type="checkbox" name="tags" value="foodie" /> Foodie</label>
          <label><input type="checkbox" name="tags" value="asian" /> Asian</label>
          <label><input type="checkbox" name="tags" value="athletic" /> Athletic</label>
          <label><input type="checkbox" name="tags" value="travel" /> Travel</label>
        </div>

        <h3 class="section-title">Pick Emoji</h3>

        <select name="emoji" required>
          <option value="">-- Select an emoji --</option>
          <option value="😄">😄 Happy</option>
          <option value="🍕">🍕 Foodie</option>
          <option value="🏋️">🏋️ Athletic</option>
          <option value="✈️">✈️ Traveler</option>
          <option value="🎮">🎮 Gamer</option>
        </select>

        <label class="form-label">
          Description:
          <input type="text" name="description" placeholder="Enter description" />
        </label>

        <label class="form-label">
          Age:
          <input type="number" name="age" placeholder="Enter age" min="0" />
        </label>

        <label class="form-label">
          Major:
          <input type="text" name="major" placeholder="Enter major" />
        </label>

        <label class="form-label">
          Gender:
          <input type="text" name="gender" placeholder="Enter gender" />
        </label>

        <label class="form-label">
          Pronouns:
          <input type="text" name="pronouns" placeholder="Enter pronouns" />
        </label>

        <label class="form-label">
          Height:
          <input type="text" name="height" placeholder="Enter height" />
        </label>

        <label class="form-label">
          Clubs and Sports:
          <input type="text" name="clubs_and_sports" placeholder="Enter clubs and sports" />
        </label>

        <label class="form-label">
          Looking For:
          <input type="text" name="looking_for" placeholder="Enter what you are looking for" />
        </label>

        <button type="submit" class="submit-btn">
          Create Profile
        </button>

      </form>
    </div>
  </body>
</html>
