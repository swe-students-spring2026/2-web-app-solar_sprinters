<!doctype html>
<html>
  <head>
    <title>View Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>

  <body class="add-page">
    <div class="page-wrap">

      <a href="{{ url_for('home') }}" class="back-btn">Back</a>

      <h1 class="section-title center">Profile</h1>

      <div class="card">
        <p class="line"><strong>Name:</strong> {{ name }}</p>
        <p class="line"><strong>Address:</strong> {{ address }}</p>

        <h3 class="section-subtitle">Tags</h3>
        <p class="tight">{{ tags | join(', ') }}</p>

        <h3 class="section-subtitle">Emoji</h3>
        <p class="tight">{{ emoji }}</p>

        <h3 class="section-subtitle">Description</h3>
        <p class="tight">{{ description }}</p>

        <h3 class="section-subtitle">Age</h3>
        <p class="tight">{{ age }}</p>

        <h3 class="section-subtitle">Major</h3>
        <p class="tight">{{ major }}</p>
      </div>

    </div>
  </body>
</html>
