<!DOCTYPE html>
<html>

<head>
    <title>Update Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="add-page">

    <div class="form-card">

        <a href="{{ url_for('home') }}" class="back-btn">
            Back
        </a>

        <h1 class="section-title center">
            Update Your Profile
        </h1>

        <form method="POST" action="{{ url_for('update_profile', profile_id=profile._id) }}" class="form-stack">

            <label class="form-label">
                Name:
                <input type="text" name="name" value="{{ profile.name }}" required>
            </label>

            <label class="form-label">
                Address:
                <input type="text" name="address" value="{{ profile.address }}" required>
            </label>

            <h3 class="section-title">Pick Tags</h3>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="tags" value="foodie" {% if "foodie" in profile.tags %}checked{% endif
                        %}>
                    Foodie
                </label>

                <label>
                    <input type="checkbox" name="tags" value="asian" {% if "asian" in profile.tags %}checked{% endif %}>
                    Asian
                </label>

                <label>
                    <input type="checkbox" name="tags" value="athletic" {% if "athletic" in profile.tags %}checked{%
                        endif %}>
                    Athletic
                </label>

                <label>
                    <input type="checkbox" name="tags" value="travel" {% if "travel" in profile.tags %}checked{% endif
                        %}>
                    Travel
                </label>
            </div>

            <h3 class="section-title">Pick Emoji</h3>

            <select name="emoji">
                <option value="😄" {% if profile.emoji=="😄" %}selected{% endif %}>😄 Happy</option>
                <option value="🍕" {% if profile.emoji=="🍕" %}selected{% endif %}>🍕 Foodie</option>
                <option value="🏋️" {% if profile.emoji=="🏋️" %}selected{% endif %}>🏋️ Athletic</option>
                <option value="✈️" {% if profile.emoji=="✈️" %}selected{% endif %}>✈️ Traveler</option>
                <option value="🎮" {% if profile.emoji=="🎮" %}selected{% endif %}>🎮 Gamer</option>
            </select>

            <select name="nyu_life_tags">
                <option value="">Filter by NYU Life Tags</option>
                <option value="boobst" {% if profile.nyu_life_tags=="boobst" %}selected{% endif %}>Bobst regular 📚
                </option>
                <option value="kimmel" {% if profile.nyu_life_tags=="kimmel" %}selected{% endif %}>Kimmel camper</option>
                <option value="violet_pride" {% if profile.nyu_life_tags=="violet_pride" %}selected{% endif %}>Violet
                    pride 💜</option>
                <option value="washington_square_park" {% if profile.nyu_life_tags=="washington_square_park" %}selected{%
                    endif %}>Always in Washington Square Park</option>
                <option value="study_abroad" {% if profile.nyu_life_tags=="study_abroad" %}selected{% endif %}>Study
                    abroad soon</option>
            </select>

            <select name="school_specific">
                <option value="">Filter by School</option>
                <option value="cas" {% if profile.school_specific=="cas" %}selected{% endif %}>CAS core survivor</option>
                <option value="tisch" {% if profile.school_specific=="tisch" %}selected{% endif %}>Tisch creative 🎭</option>
                <option value="stern" {% if profile.school_specific=="stern" %}selected{% endif %}>Stern kid 📊</option>
                <option value="tandon" {% if profile.school_specific=="tandon" %}selected{% endif %}>Tandon engineer 💻
                </option>
                <option value="gallatin" {% if profile.school_specific=="gallatin" %}selected{% endif %}>Gallatin
                    build-your-own-major</option>
            </select>

            <label class="form-label">
                Description:
                <input type="text" name="description" value="{{ profile.description }}">
            </label>

            <label class="form-label">
                Age:
                <input type="number" name="age" value="{{ profile.age }}">
            </label>

            <label class="form-label">
                Major:
                <input type="text" name="major" value="{{ profile.major }}">
            </label>

            <label class="form-label">
                Gender:
                <input type="text" name="gender" value="{{ profile.gender }}">
            </label>

            <label class="form-label">
                Pronouns:
                <input type="text" name="pronouns" value="{{ profile.pronouns }}">
            </label>

            <label class="form-label">
                Height:
                <input type="text" name="height" value="{{ profile.height }}">
            </label>

            <label class="form-label">
                Clubs and Sports:
                <input type="text" name="clubs_and_sports" value="{{ profile.clubs_and_sports }}">
            </label>

            <label class="form-label">
                Looking For:
                <input type="text" name="looking_for" value="{{ profile.looking_for }}">
            </label>

            <button type="submit" class="submit-btn">
                Update Profile
            </button>

        </form>
    </div>

</body>

</html>
