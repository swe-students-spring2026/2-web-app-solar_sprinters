<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NYU Match</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <div class="container">
      <h1 class="title">NYU Match &#128156;</h1>
      <p class="subtitle">A simple way for NYU students to connect.</p>

      <div class="nav-buttons">
        {% if current_user.is_authenticated %}
        <p class="card-desc" style="text-align: center; margin: 0">
          Logged in as {{ current_user.name }}
        </p>
        <a href="{{ url_for('view_profile') }}" class="btn nav-btn"
          >View Profile</a
        >
        <a href="{{ url_for('search_page') }}" class="btn nav-btn"
          >Search Matches</a
        >
        <a href="{{ url_for('match_results_page') }}" class="btn nav-btn"
          >View Matches</a
        >
        <a href="{{ url_for('edit_page') }}" class="btn nav-btn"
          >Edit Profile</a
        >
        <a href="{{ url_for('delete_page') }}" class="btn danger"
          >Delete Account</a
        >
        <form method="POST" action="{{ url_for('logout') }}">
          <button type="submit" class="btn btn-logout">Log Out</button>
        </form>
        {% else %}
        <a href="{{ url_for('login_page') }}" class="btn">Log In</a>
        <a href="{{ url_for('add_page') }}" class="btn">Create Profile</a>
        {% endif %}
      </div>
    </div>
  </body>
</html>
